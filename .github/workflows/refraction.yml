name: refraction

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: |
          go run ./cmd/refraction \
            --format github \
            --min-severity warning \
            --min-confidence medium \
            --ignore-path '*_test.go' \
            --ignore-path README.ru.md \
            --ignore-path docs/ADVERSARY.md \
            --ignore-path docs/assets/refraction-screenshot.svg \
            --ignore-path internal/signatures/data/ \
            --ignore-path testdata/malicious/ \
            --ignore-path testdata/rules/ \
            .
